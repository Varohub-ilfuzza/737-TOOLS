name: b737_tools
description: B737 Maintenance Tools Reference App for TMAs.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  share_plus: ^7.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cb_data.json
    - assets/fim_data.json
    - assets/pn_data.json
